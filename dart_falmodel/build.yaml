targets:
  $default:
    builders:
      json_serializable:
        options:
          checked: true
          explicit_to_json: true
      source_gen|combining_builder:
        options:
          build_extensions:
            'lib/{{path}}/{{file}}.dart': 'lib/{{path}}/generated/{{file}}.g.dart'
      freezed:
        enabled: true
        options:
          build_extensions:
            'lib/{{path}}/{{file}}.dart': 'lib/{{path}}/generated/{{file}}.freezed.dart'
      retrofit_generator|retrofit_generator:
        enabled: true