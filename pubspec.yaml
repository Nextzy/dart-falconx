name: dart_falconx_core
description: A dart falcon package.
version: 1.0.1

environment:
  sdk: ">=3.9.0 <4.0.0"

workspace:
  - dart_falconnect
  - dart_falconx
  - dart_falmodel
  - dart_faltool

dev_dependencies:
  melos: ^7.5.1

melos:
  scripts:
    get:
      description: Get dependencies for all packages
      run: dart pub get
      exec:
        concurrency: 1

    upgrade:
      description: Upgrade dependencies in all packages
      run: dart pub upgrade
      exec:
        concurrency: 1

    outdated:
      description: Check outdated dependencies
      run: dart pub outdated
      exec:
        concurrency: 1

    build_runner:
      description: Run build_runner in all packages
      run: dart run build_runner build -d
      exec:
        concurrency: 1

    verify:web:
      description: Verify dart_falconnect compiles and runs on web
      run: |
        cd dart_falconnect && \
        dart compile js -o /tmp/dart_falconnect_web.js test/web/compile_smoke.dart && \
        dart test -p chrome test/web/engine_web_test.dart

