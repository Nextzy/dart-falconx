name: dart_falconx_core
description: A dart falcon package.
version: 1.0.1

environment:
  sdk: ">=3.12.0 <4.0.0"

workspace:
  - dart_falconnect
  - dart_falconx
  - dart_falmodel
  - dart_faltool

dev_dependencies:
  melos: ^8.0.0

melos:
  scripts:
    analyze:
      description: Run dart analyze across all packages.
      exec:
        command: dart analyze
        concurrency: 4

    format:
      description: Run dart format across all packages.
      exec:
        command: dart format --set-exit-if-changed .
        concurrency: 4

    fix:
      description: Fix all packages.
      exec:
        command: >-
          dart fix --apply
          --code=always_put_required_named_parameters_first
          --code=avoid_unused_constructor_parameters
          --code=cast_nullable_to_non_nullable
          --code=directives_ordering
          --code=omit_local_variable_types
          --code=prefer_const_constructors
          --code=unnecessary_breaks
          --code=unnecessary_cast
          --code=unnecessary_const
          --code=unnecessary_import
          --code=unnecessary_non_null_assertion
          --code=unnecessary_null_comparison
          --code=unnecessary_lambdas
          --code=unused_catch_stack
          --code=unused_import
          --code=use_null_aware_elements
        concurrency: 4

    fix:format:
      description: Run fix and format together.
      steps:
        - fix
        - format

    test:
      description: Run tests across all packages.
      exec:
        command: dart test
        concurrency: 4
        failFast: true
      packageFilters:
        dirExists: test

    build_runner:
      description: Run build_runner for code generation in all packages.
      exec:
        command: dart run build_runner build --delete-conflicting-outputs
        concurrency: 1
        failFast: false
      packageFilters:
        dependsOn: build_runner

    build_runner:fast:
      description: Run build_runner without deleting outputs — reuses incremental cache (use when just adding fields, not after merges).
      exec:
        command: dart run build_runner build
        concurrency: 4
        failFast: false
      packageFilters:
        dependsOn: build_runner

    build_runner:watch:
      description: Run build_runner watch for code generation.
      exec:
        command: dart run build_runner watch --delete-conflicting-outputs
        concurrency: 1
      packageFilters:
        dependsOn: build_runner

    get:
      description: Get all packages.
      exec:
        command: dart pub get
        concurrency: 5

    upgrade:
      description: Upgrade all packages.
      exec:
        command: dart pub upgrade
        concurrency: 5
